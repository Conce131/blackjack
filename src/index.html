<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Mi BlackJack</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="assets/css/styles.css" />
  </head>
  <body>
    <header class="title">BlackJack</header>
    <div class="row mt-2">
      <div class="col text-center">
        <button id="" type="button" class="btn btn-danger">Nuevo Juego</button>
        <button id="btnDraw" type="button" class="btn btn-primary">
          Pedir Carta
        </button>
        <button id="btnStop" type="button" class="btn btn-primary">
          Detener
        </button>
      </div>
    </div>
    <div class="row container">
      <div class="col">
        <h1>Jugador 1 - <small>0</small></h1>
        <div id="playerCards"></div>
      </div>
    </div>
    <div class="row container mt-2">
      <div class="col">
        <h1>Pc 1 - <small>0</small></h1>
        <div id="pcCards">
          <!-- <img class="carta" src="assets/cartas/red_back.png" alt="" /> -->
        </div>
      </div>
    </div>
    <script src="assets/js/juego.js" type="module"></script>
  </body>
</html>
